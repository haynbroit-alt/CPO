services:
  - type: web
    name: proof-protocol
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health

    envVars:
      # Set in Render dashboard → Environment → Secret Files / Env Vars
      - key: ANTHROPIC_API_KEY
        sync: false          # injected as a secret in the Render dashboard

      # Node identity — generate with: python scripts/generate_node_key.py
      # then paste the output here as a secret in the Render dashboard
      - key: NODE_PRIVATE_KEY_B64
        sync: false

      - key: NODE_KEY_ROTATION_ID
        value: v1

      # Use subprocess executor on Render (no Docker socket available)
      - key: EXECUTOR_BACKEND
        value: subprocess

      # Key + ledger stored in the app workdir on free tier (ephemeral).
      # For paid plans: set /var/data/node_key.pem + /var/data/ledger.jsonl
      # and re-add the disk block below.
      - key: PRIVATE_KEY_FILE
        value: node_key.pem

      - key: LEDGER_FILE
        value: ledger.jsonl

      - key: BRAIN_MODEL
        value: claude-haiku-4-5
