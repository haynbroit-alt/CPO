<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIOS — Preuve vérifiée</title>
  <meta id="og-title" property="og:title" content="SIOS — Anomalie financière confirmée">
  <meta id="og-desc" property="og:description" content="Cet audit a été généré et signé par SIOS. Reproductible, vérifiable, incontestable.">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f7f7f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    a { color: inherit; text-decoration: none; }

    .card {
      background: #fff;
      border: 1.5px solid #1a1a1a;
      border-radius: 16px;
      padding: 32px 36px;
      max-width: 460px;
      width: 100%;
      box-shadow: 4px 4px 0 #1a1a1a;
    }

    .card-logo {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }

    /* Status */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .status-valid   { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status-invalid { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .status-loading { background: #f7f7f7; color: #888;    border: 1px solid #e5e5e5; }

    .card-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .card-sub   { font-size: 0.88rem; color: #666; margin-bottom: 24px; }

    /* Amount hero */
    .amount-block {
      padding: 20px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }
    .amount-label  { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #166534; margin-bottom: 4px; }
    .amount-value  { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; color: #15803d; }

    /* Details */
    .details { margin-bottom: 20px; display: flex; flex-direction: column; gap: 0; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.88rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { color: #666; }
    .detail-val { font-weight: 600; text-align: right; }
    .detail-val.green { color: #16a34a; }
    .detail-val.mono  { font-family: "SFMono-Regular", "Consolas", monospace; font-size: 0.72rem; color: #555; word-break: break-all; max-width: 240px; }

    /* CTA */
    .cta-block {
      margin-top: 24px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      text-align: center;
    }
    .cta-block p  { color: #aaa; font-size: 0.82rem; margin-bottom: 12px; line-height: 1.5; }
    .cta-btn {
      display: block;
      padding: 12px 20px;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .cta-btn:hover { opacity: 0.9; }

    /* Loading spinner */
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid #eee;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-footer {
      margin-top: 20px;
      font-size: 0.72rem;
      color: #bbb;
      text-align: center;
    }
    .card-footer a { color: #aaa; }

    /* Demo notice */
    .demo-notice {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #92400e;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="card-logo">SIOS — Moteur d'audit financier</div>
  <div class="spinner"></div>
  <div class="status-badge status-loading">Vérification en cours…</div>
  <div class="card-title">Chargement</div>
</div>

<script>
  const CPO = "{{CPO}}";

  function fmt(amount, currency) {
    return new Intl.NumberFormat('fr-FR', {
      style: 'currency', currency: currency || 'EUR', maximumFractionDigits: 0,
    }).format(amount);
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('fr-FR', {
      day: 'numeric', month: 'long', year: 'numeric',
    });
  }

  function renderValid(d) {
    const card = document.getElementById('card');
    card.innerHTML = `
      <div class="card-logo">SIOS — Moteur d'audit financier</div>

      <div class="status-badge status-valid">✓ Audit vérifié</div>
      <div class="card-title">Cette anomalie est réelle.</div>
      <div class="card-sub">Cet audit a été généré par SIOS, signé cryptographiquement et est reproductible à l'identique.</div>

      ${d.is_demo ? '<div class="demo-notice">Audit de démonstration — données d\'exemple.</div>' : ''}

      <div class="amount-block">
        <div class="amount-label">Montant détecté</div>
        <div class="amount-value">${fmt(d.total_detected, d.currency)}</div>
      </div>

      <div class="details">
        <div class="detail-row">
          <span class="detail-key">Date de l'audit</span>
          <span class="detail-val">${fmtDate(d.audit_date)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Anomalies trouvées</span>
          <span class="detail-val">${d.findings_count} finding${d.findings_count !== 1 ? 's' : ''}</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Transactions analysées</span>
          <span class="detail-val">${d.transactions_analyzed.toLocaleString('fr-FR')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Reproductible</span>
          <span class="detail-val green">✓ Oui</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Preuve CPO</span>
          <span class="detail-val mono">${d.cpo.slice(0, 32)}…</span>
        </div>
      </div>

      <div class="cta-block">
        <p>Votre entreprise laisse-t-elle de l'argent sur la table ?<br>SIOS détecte et prouve les fuites en quelques minutes.</p>
        <a href="/" class="cta-btn">Lancer votre propre audit →</a>
      </div>

      <div class="card-footer">
        SIOS · <a href="/gallery">Voir les audits publics</a> · <a href="/demo">Démo gratuite</a>
      </div>
    `;

    document.title = `SIOS — Anomalie vérifiée · ${fmt(d.total_detected, d.currency)}`;
  }

  function renderInvalid() {
    const card = document.getElementById('card');
    card.innerHTML = `
      <div class="card-logo">SIOS — Moteur d'audit financier</div>
      <div class="status-badge status-invalid">✗ Preuve introuvable</div>
      <div class="card-title">Cette preuve n'est pas reconnue.</div>
      <div class="card-sub" style="margin-bottom:24px">Ce CPO n'a pas été généré par ce serveur SIOS, ou a été émis sur une autre instance.</div>
      <a href="/" style="display:block;padding:14px;background:#1a1a1a;color:#fff;border-radius:10px;text-align:center;font-weight:700;font-size:0.9rem;">Lancer un audit →</a>
      <div class="card-footer" style="margin-top:16px"><a href="/gallery">← Voir les audits vérifiés</a></div>
    `;
  }

  async function verify() {
    try {
      const res = await fetch(`/api/verify/${CPO}`);
      if (!res.ok) { renderInvalid(); return; }
      renderValid(await res.json());
    } catch(e) {
      renderInvalid();
    }
  }

  verify();
</script>
</body>
</html>
