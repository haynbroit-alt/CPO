<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIOS — Visualiseur d'audit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ─────────────────────────────────────────────────── */
    nav {
      border-bottom: 1px solid #eee;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-logo { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 24px; font-size: 0.88rem; color: #555; }
    .nav-links a:hover { color: #1a1a1a; }
    .nav-back { font-size: 0.88rem; color: #555; }
    .nav-back:hover { color: #1a1a1a; }
    .nav-cta {
      margin-left: auto;
      padding: 7px 18px;
      background: #1a1a1a;
      color: #fff;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .page { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Audit header ─────────────────────────────────────────── */
    .audit-header { margin-bottom: 36px; }
    .audit-eyebrow { font-size: 0.78rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .audit-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
    .audit-meta { font-size: 0.88rem; color: #888; display: flex; gap: 16px; flex-wrap: wrap; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .badge-client { background: #dcfce7; color: #166534; }
    .badge-internal { background: #fef9c3; color: #854d0e; }
    .badge-reproducible { background: #dbeafe; color: #1d4ed8; }

    /* ── Executive summary ────────────────────────────────────── */
    .exec-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
      padding: 24px;
      border: 1.5px solid #1a1a1a;
      border-radius: 12px;
    }
    @media (max-width: 540px) { .exec-summary { grid-template-columns: 1fr; } }
    .exec-metric { display: flex; flex-direction: column; gap: 2px; }
    .exec-val { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; }
    .exec-val.green { color: #16a34a; }
    .exec-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #888; }

    /* ── Section title ────────────────────────────────────────── */
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 16px;
    }

    /* ── Truth Stack ──────────────────────────────────────────── */
    .truth-stack { display: flex; flex-direction: column; gap: 0; }

    .truth-layer {
      border: 1px solid #e5e5e5;
      border-radius: 0;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 16px;
      align-items: start;
      transition: border-color 0.15s;
    }
    .truth-layer:first-child { border-radius: 10px 10px 0 0; }
    .truth-layer:last-child { border-radius: 0 0 10px 10px; }
    .truth-layer:not(:last-child) { border-bottom: none; }
    .truth-layer:hover { border-color: #999; z-index: 1; position: relative; }

    @media (max-width: 580px) { .truth-layer { grid-template-columns: 1fr; } }

    .layer-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      padding-top: 2px;
    }
    .layer-content { min-width: 0; }
    .layer-content .mono {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.78rem;
      color: #555;
      word-break: break-all;
      display: block;
      margin-top: 4px;
    }
    .layer-detail { font-size: 0.85rem; color: #444; }
    .layer-detail strong { font-weight: 600; color: #1a1a1a; }

    .layer-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-ok { color: #16a34a; }
    .status-warn { color: #ca8a04; }
    .status-blue { color: #2563eb; }

    /* ── Anomalies ────────────────────────────────────────────── */
    .anomaly-list { display: flex; flex-direction: column; gap: 10px; }
    .anomaly-item {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .anomaly-info { flex: 1; min-width: 0; }
    .anomaly-type-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }
    .anomaly-desc { font-size: 0.92rem; color: #1a1a1a; margin-top: 2px; }
    .anomaly-vendor { font-weight: 600; }
    .anomaly-amounts { text-align: right; flex-shrink: 0; }
    .amount-estimated { font-size: 0.8rem; color: #aaa; }
    .amount-confirmed { font-size: 1.05rem; font-weight: 800; color: #16a34a; }
    .amount-unconfirmed { font-size: 1.05rem; font-weight: 800; color: #1a1a1a; }

    .trust-pill {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .trust-HIGH { background: #dcfce7; color: #166534; }
    .trust-MEDIUM { background: #dbeafe; color: #1d4ed8; }
    .trust-LOW { background: #f0f0f0; color: #888; }

    /* ── Timeline ─────────────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 16px;
      bottom: 16px;
      width: 1px;
      background: #e5e5e5;
    }
    .timeline-item {
      display: flex;
      gap: 16px;
      padding: 0 0 24px;
      position: relative;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 800;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .timeline-content { padding-top: 4px; }
    .timeline-label { font-weight: 600; font-size: 0.92rem; }
    .timeline-date { font-size: 0.8rem; color: #888; margin-bottom: 2px; }
    .timeline-detail { font-size: 0.85rem; color: #555; }

    /* ── Artifacts ────────────────────────────────────────────── */
    .artifact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .artifact-item {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .artifact-type {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 4px;
    }
    .artifact-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .artifact-value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.72rem;
      color: #555;
      word-break: break-all;
    }

    /* ── Replay button ────────────────────────────────────────── */
    .replay-section {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px 28px;
    }
    .replay-section h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; }
    .replay-section p { font-size: 0.88rem; color: #555; margin-bottom: 16px; }
    .replay-btn {
      padding: 10px 22px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .replay-btn:hover { background: #333; }
    .replay-btn:disabled { background: #999; cursor: not-allowed; }
    .replay-result {
      margin-top: 14px;
      padding: 14px 16px;
      background: #dcfce7;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #166534;
      display: none;
    }
    .replay-result.show { display: block; }

    /* ── Share ────────────────────────────────────────────────── */
    .share-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      margin-bottom: 40px;
    }
    .share-url {
      flex: 1;
      font-family: monospace;
      font-size: 0.8rem;
      color: #555;
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 6px 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      padding: 6px 14px;
      border: 1.5px solid #1a1a1a;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #f5f5f5; }

    /* ── Loading ──────────────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .error-state {
      text-align: center;
      padding: 80px 20px;
    }
    .error-state h2 { color: #dc2626; margin-bottom: 8px; }
    .error-state p { color: #555; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">SIOS</a>
  <div class="nav-links">
    <a href="/gallery">Galerie de preuves</a>
    <a href="/benchmark">Benchmark</a>
    <a href="/trail">Fil de preuves</a>
    <a href="/live">Audit gratuit</a>
    <a href="/live">Audit gratuit</a>
  </div>
  <a href="/" class="nav-cta">Lancer un audit →</a>
</nav>

<div class="page" id="page-content">
  <div class="loading" id="loading">Chargement de l'audit…</div>
</div>

<script>
const ANOMALY_LABELS = {
  duplicate_payment: 'Doublon de paiement',
  unused_subscription: 'Abonnement inutilisé',
  unused_license: 'Licence inutilisée',
  cloud_waste: 'Cloud waste',
  cost_anomaly: 'Anomalie de coût',
  telecom_overcharge: 'Surcharge télécom',
  renegotiable_contract: 'Contrat renégociable',
};

const BADGE_CONFIG = {
  client_verified:    { cls: 'badge-client',       label: '✔ Validé client' },
  internal_only:      { cls: 'badge-internal',     label: '~ Validé en interne' },
  reproducible_only:  { cls: 'badge-reproducible', label: '⟳ Reproductible uniquement' },
};

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function getAuditId() {
  const parts = window.location.pathname.split('/');
  return parts[parts.length - 1] || parts[parts.length - 2];
}

async function replayAudit(auditId) {
  const btn = document.getElementById('replay-btn');
  const result = document.getElementById('replay-result');
  btn.disabled = true;
  btn.textContent = 'Rejeu en cours…';

  try {
    const r = await fetch(`/proofs/${auditId}/replay`, { method: 'POST' });
    const d = await r.json();
    result.innerHTML = `
      <strong>✔ Résultat : correspondance exacte</strong><br>
      Dataset hash : <code>${d.replay_dataset_hash.slice(0,16)}…</code><br>
      Detection hash : <code>${d.replay_detection_hash.slice(0,16)}…</code><br>
      Drift : ${d.drift_pct}% · ${d.anomalies_confirmed} anomalie${d.anomalies_confirmed > 1 ? 's' : ''} confirmée${d.anomalies_confirmed > 1 ? 's' : ''}
    `;
    result.classList.add('show');
  } catch(e) {
    result.innerHTML = 'Erreur lors du rejeu.';
    result.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Rejouer depuis les données brutes';
  }
}

function renderAudit(a) {
  const badge = BADGE_CONFIG[a.verification_badge] || BADGE_CONFIG.reproducible_only;
  const ts = a.truth_stack;

  // Layer status indicators
  const rawStatus  = `<span class="layer-status status-ok">✔ Immuable</span>`;
  const detStatus  = ts.detection.reproducible
    ? `<span class="layer-status status-ok">✔ Reproductible · drift ${ts.detection.drift_pct}%</span>`
    : `<span class="layer-status status-warn">⚠ Non reproductible</span>`;
  const verStatus  = a.verification_level === 'client_verified'
    ? `<span class="layer-status status-ok">✔ Signé client</span>`
    : a.verification_level === 'internal_only'
    ? `<span class="layer-status status-warn">~ Validé en interne</span>`
    : `<span class="layer-status status-blue">⟳ Reproductible</span>`;

  document.getElementById('page-content').innerHTML = `

<!-- Audit header -->
<div class="audit-header">
  <div class="audit-eyebrow">Audit #${String(a.audit_number).padStart(4,'0')} · ${a.sector}</div>
  <div class="audit-title">Rapport d'audit vérifiable</div>
  <div class="audit-meta">
    <span>${fmtDate(a.audit_date)}</span>
    <span>${a.transactions_analyzed.toLocaleString('fr-FR')} transactions analysées</span>
    <span>Confiance : ${a.confidence_pct}%</span>
  </div>
</div>

<!-- Share bar -->
<div class="share-bar">
  <span style="font-size:0.8rem;color:#888;white-space:nowrap">Lien de partage :</span>
  <div class="share-url" id="share-url">${window.location.href}</div>
  <button class="copy-btn" onclick="copyLink()">Copier</button>
</div>

<!-- Executive summary -->
<div class="exec-summary">
  <div class="exec-metric">
    <span class="exec-val">${a.anomalies_detected}</span>
    <span class="exec-label">Anomalies détectées</span>
  </div>
  <div class="exec-metric">
    <span class="exec-val green">${a.confirmed_savings_eur != null ? fmt(a.confirmed_savings_eur) : fmt(a.estimated_savings_eur)}</span>
    <span class="exec-label">${a.confirmed_savings_eur != null ? 'Économies confirmées' : 'Économies estimées'}</span>
  </div>
  <div class="exec-metric">
    <span class="exec-val">${a.confidence_pct}%</span>
    <span class="exec-label">Niveau de confiance</span>
    <div style="margin-top:6px"><span class="badge ${badge.cls}">${badge.label}</span></div>
  </div>
</div>

<!-- Anomalies -->
<div class="section">
  <div class="section-title">Anomalies détectées</div>
  <div class="anomaly-list">
    ${a.anomalies.map(an => `
      <div class="anomaly-item">
        <div class="anomaly-info">
          <div class="anomaly-type-label">${ANOMALY_LABELS[an.type] || an.type} <span class="trust-pill trust-${an.trust_tier}">${an.trust_tier}</span></div>
          <div class="anomaly-desc"><span class="anomaly-vendor">${an.vendor}</span> — ${an.description}</div>
        </div>
        <div class="anomaly-amounts">
          <div class="amount-estimated">Estimé : ${fmt(an.estimated_amount)}</div>
          ${an.confirmed_amount != null
            ? `<div class="amount-confirmed">Confirmé : ${fmt(an.confirmed_amount)}</div>`
            : `<div class="amount-unconfirmed">${fmt(an.estimated_amount)}</div>`}
        </div>
      </div>
    `).join('')}
  </div>
</div>

<!-- Truth Stack -->
<div class="section">
  <div class="section-title">Truth Stack — 3 couches de vérité</div>
  <div class="truth-stack">

    <div class="truth-layer">
      <div class="layer-label">RAW DATA</div>
      <div class="layer-content">
        <div class="layer-detail">
          <strong>Snapshot immuable</strong> — ${ts.raw_data.transaction_count.toLocaleString('fr-FR')} transactions · source : ${ts.raw_data.source} · période : ${ts.raw_data.period_months} mois
        </div>
        <span class="mono">Dataset hash : ${ts.raw_data.dataset_hash}</span>
      </div>
      ${rawStatus}
    </div>

    <div class="truth-layer">
      <div class="layer-label">DETECTION</div>
      <div class="layer-content">
        <div class="layer-detail">
          <strong>${ts.detection.model_version}</strong> — Règles appliquées : ${ts.detection.rules_applied.join(', ')}
        </div>
        <span class="mono">Detection hash : ${ts.detection.detection_hash}</span>
      </div>
      ${detStatus}
    </div>

    <div class="truth-layer">
      <div class="layer-label">VERIFICATION</div>
      <div class="layer-content">
        <div class="layer-detail">
          ${ts.verification.client_approved ? '<strong>✔ Signé par le client</strong>' : ''}
          ${ts.verification.accountant_validated ? (ts.verification.client_approved ? ' · ' : '') + '<strong>✔ Validé comptable</strong>' : ''}
          ${ts.verification.approver_role ? ` · Approuvé par : ${ts.verification.approver_role}` : ''}
          ${ts.verification.approved_at ? ` · ${fmtDate(ts.verification.approved_at)}` : ''}
          ${!ts.verification.client_approved && !ts.verification.accountant_validated ? 'Reproductible — validation humaine en attente' : ''}
        </div>
        ${ts.verification.signature_ref ? `<span class="mono">Ref signature : ${ts.verification.signature_ref}</span>` : ''}
      </div>
      ${verStatus}
    </div>

  </div>
</div>

<!-- Timeline -->
<div class="section">
  <div class="section-title">Timeline de l'audit</div>
  <div class="timeline">
    ${a.timeline.map((t, i) => `
      <div class="timeline-item">
        <div class="timeline-dot">${t.step}</div>
        <div class="timeline-content">
          <div class="timeline-date">${fmtDate(t.date)}</div>
          <div class="timeline-label">${t.label}</div>
          <div class="timeline-detail">${t.detail}</div>
        </div>
      </div>
    `).join('')}
  </div>
</div>

<!-- Artifacts -->
<div class="section">
  <div class="section-title">Preuves techniques</div>
  <div class="artifact-grid">
    ${a.artifacts.map(art => `
      <div class="artifact-item">
        <div class="artifact-type">${art.type}</div>
        <div class="artifact-label">${art.label}</div>
        <div class="artifact-value">${art.value}</div>
      </div>
    `).join('')}
  </div>
</div>

<!-- Reproductibilité -->
<div class="section">
  <div class="section-title">Reproductibilité</div>
  <div class="replay-section">
    <h3>Rejouer cet audit depuis les données brutes</h3>
    <p>Relancez l'analyse sur le même dataset. Le résultat doit être strictement identique — même hash, mêmes anomalies, même montant.</p>
    <button class="replay-btn" id="replay-btn" onclick="replayAudit('${a.id}')">Rejouer depuis les données brutes</button>
    <div class="replay-result" id="replay-result"></div>
  </div>
</div>

`;
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier', 1800);
  });
}

async function loadAudit() {
  const auditId = getAuditId();
  if (!auditId) {
    document.getElementById('page-content').innerHTML = `
      <div class="error-state"><h2>Audit introuvable</h2><p>L'identifiant d'audit est manquant.</p></div>`;
    return;
  }

  try {
    const r = await fetch(`/proofs/${auditId}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${r.status}`);
    }
    const data = await r.json();
    renderAudit(data);
  } catch(e) {
    document.getElementById('page-content').innerHTML = `
      <div class="error-state">
        <h2>Audit introuvable</h2>
        <p>${e.message}</p>
        <p style="margin-top:16px"><a href="/gallery" style="color:#555;text-decoration:underline">← Retour à la galerie</a></p>
      </div>`;
  }
}

loadAudit();
</script>

</body>
</html>
